services:
    postgres:
        image: postgres:15-alpine
        container_name: cinema-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USERNAME:-cinema_user}
            POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
            POSTGRES_DB: ${DB_NAME:-cinema_db}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/00-init-schemas.sql:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-cinema_user} -d ${DB_NAME:-cinema_db}']
            interval: 5s
            timeout: 5s
            retries: 10

    identity-service:
        build:
            context: .
            dockerfile: backend-services/identity-service/Dockerfile
        container_name: cinema-identity
        restart: unless-stopped
        environment:
            PORT: 3001
            NODE_ENV: ${NODE_ENV:-local}
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USERNAME: ${DB_USERNAME:-cinema_user}
            DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
            DB_NAME: ${DB_NAME:-cinema_db}
            JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
            ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
            REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
            COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
            COOKIE_SECURE: ${COOKIE_SECURE:-false}
            COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
            LOGIN_LOCK_THRESHOLD: ${LOGIN_LOCK_THRESHOLD:-5}
            LOGIN_LOCK_WINDOW_MIN: ${LOGIN_LOCK_WINDOW_MIN:-15}
            CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
        expose:
            - '3001'
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/v1/health || exit 1']
            interval: 10s
            timeout: 5s
            retries: 5

    cinema-service:
        build:
            context: .
            dockerfile: backend-services/cinema-service/Dockerfile
        container_name: cinema-cinema
        restart: unless-stopped
        environment:
            PORT: 3002
            NODE_ENV: ${NODE_ENV:-local}
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USERNAME: ${DB_USERNAME:-cinema_user}
            DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
            DB_NAME: ${DB_NAME:-cinema_db}
            IDENTITY_SERVICE_URL: http://identity-service:3001
            CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
            SOCKET_CORS_ORIGINS: ${SOCKET_CORS_ORIGINS:-http://localhost,http://localhost:5173}
            RESERVATION_HOLD_MINS: ${RESERVATION_HOLD_MINS:-15}
            COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
            COOKIE_SECURE: ${COOKIE_SECURE:-false}
            COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
            IDEMPOTENCY_TTL_HOURS: ${IDEMPOTENCY_TTL_HOURS:-24}
        expose:
            - '3002'
        depends_on:
            postgres:
                condition: service_healthy
            identity-service:
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/api/v1/health || exit 1']
            interval: 10s
            timeout: 5s
            retries: 5

    cinema-app:
        build:
            context: .
            dockerfile: frontend-application/cinema-app/Dockerfile
        container_name: cinema-app
        restart: unless-stopped
        expose:
            - '80'
        depends_on:
            - identity-service
            - cinema-service

    nginx:
        image: nginx:1.27-alpine
        container_name: cinema-nginx
        restart: unless-stopped
        ports:
            - '80:80'
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - cinema-app
            - identity-service
            - cinema-service

volumes:
    postgres_data:
