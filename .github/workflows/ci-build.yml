name: Build

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    NODE_VERSION: '20'

jobs:
    # ── 1. Install ───────────────────────────────────────────────────────────────
    install:
        name: Install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Cache node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

    # ── 2. Lint ──────────────────────────────────────────────────────────────────
    lint:
        name: Lint
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - run: npm ci --legacy-peer-deps

            - name: Lint (zero warnings)
              run: npm run lint -- --max-warnings 0

            - name: Format check
              run: npm run format:check

            - name: Dependency audit (report)
              run: npm audit --audit-level=high || true

            - name: Dependency audit (gate — critical only, ADR-14)
              run: npm audit --audit-level=critical

    # ── 3. Typecheck ─────────────────────────────────────────────────────────────
    typecheck:
        name: Typecheck
        needs: install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - run: npm ci --legacy-peer-deps

            - name: Build SDK (required before typecheck)
              run: npm run build --workspace backend-services/libs/core/sdk --if-present

            - name: Typecheck all workspaces
              run: |
                  set -o pipefail
                  npm run typecheck 2>&1 | tee /tmp/tc_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/tc_out.txt

    # ── 4. Build SDK ─────────────────────────────────────────────────────────────
    build-sdk:
        name: Build SDK
        needs: [lint, typecheck]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - run: npm ci --legacy-peer-deps

            - name: Build @cinema/internal-sdk
              run: |
                  set -o pipefail
                  npm run build --workspace backend-services/libs/core/sdk --if-present 2>&1 | tee /tmp/sdk_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/sdk_out.txt

    # ── 5. Docker Build ───────────────────────────────────────────────────────────
    docker-build:
        name: Docker Build
        needs: build-sdk
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build identity-service image
              uses: docker/build-push-action@v7
              if: hashFiles('backend-services/identity-service/Dockerfile') != ''
              with:
                  context: .
                  file: backend-services/identity-service/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build cinema-service image
              uses: docker/build-push-action@v7
              if: hashFiles('backend-services/cinema-service/Dockerfile') != ''
              with:
                  context: .
                  file: backend-services/cinema-service/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build cinema-app image
              uses: docker/build-push-action@v7
              if: hashFiles('frontend-application/cinema-app/Dockerfile') != ''
              with:
                  context: .
                  file: frontend-application/cinema-app/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
