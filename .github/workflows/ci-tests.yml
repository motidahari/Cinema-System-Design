name: Integration & Other Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    NODE_VERSION: '20'

jobs:
    # ── Integration Tests (DAO layer) ────────────────────────────────────────────
    integration:
        name: Integration Tests (DAO)
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: cinema_user
                    POSTGRES_PASSWORD: cinema_pass
                    POSTGRES_DB: cinema_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U cinema_user"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            TEST_DB_HOST: localhost
            TEST_DB_PORT: 5432
            TEST_DB_USERNAME: cinema_user
            TEST_DB_PASSWORD: cinema_pass
            TEST_DB_NAME: cinema_db
            JWT_SECRET: test-cinema-jwt-secret-minimum-32-chars!!

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - run: npm ci --legacy-peer-deps

            - name: Build SDK
              run: npm run build --workspace backend-services/libs/core/sdk --if-present

            - name: Create DB schemas
              run: PGPASSWORD=cinema_pass psql -h localhost -U cinema_user -d cinema_db -c "CREATE SCHEMA IF NOT EXISTS identity;"

            - name: Run integration tests
              run: |
                  set -o pipefail
                  npm run test:integration --workspaces --if-present 2>&1 | tee /tmp/int_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/int_out.txt

            - name: Upload coverage reports
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: coverage-integration
                  path: backend-services/*/coverage
                  retention-days: 7

    # ── API Tests (controller layer) ─────────────────────────────────────────────
    api:
        name: API Tests (Controllers)
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: cinema_user
                    POSTGRES_PASSWORD: cinema_pass
                    POSTGRES_DB: cinema_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U cinema_user"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            TEST_DB_HOST: localhost
            TEST_DB_PORT: 5432
            TEST_DB_USERNAME: cinema_user
            TEST_DB_PASSWORD: cinema_pass
            TEST_DB_NAME: cinema_db
            JWT_SECRET: test-cinema-jwt-secret-minimum-32-chars!!

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - run: npm ci --legacy-peer-deps

            - name: Build SDK
              run: npm run build --workspace backend-services/libs/core/sdk --if-present

            - name: Create DB schemas
              run: PGPASSWORD=cinema_pass psql -h localhost -U cinema_user -d cinema_db -c "CREATE SCHEMA IF NOT EXISTS identity;"

            - name: Run API tests
              run: |
                  set -o pipefail
                  npm run test:api --workspaces --if-present 2>&1 | tee /tmp/api_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/api_out.txt

            - name: Upload coverage reports
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: coverage-api
                  path: backend-services/*/coverage
                  retention-days: 7

    # ── E2E / Playwright ─────────────────────────────────────────────────────────
    e2e:
        name: E2E Tests (Playwright)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - run: npm ci --legacy-peer-deps

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
              working-directory: frontend-application/cinema-app
              continue-on-error: true

            - name: Run Playwright page tests
              run: npm run test:e2e --workspaces --if-present
              continue-on-error: true

    # ── Coverage Gate ─────────────────────────────────────────────────────────────
    coverage-gate:
        name: Coverage Gate
        needs: [integration, api]
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: cinema_user
                    POSTGRES_PASSWORD: cinema_pass
                    POSTGRES_DB: cinema_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U cinema_user"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            TEST_DB_HOST: localhost
            TEST_DB_PORT: 5432
            TEST_DB_USERNAME: cinema_user
            TEST_DB_PASSWORD: cinema_pass
            TEST_DB_NAME: cinema_db
            JWT_SECRET: test-cinema-jwt-secret-minimum-32-chars!!

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      backend-services/*/node_modules
                      backend-services/libs/core/sdk/node_modules
                      frontend-application/*/node_modules
                  key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - run: npm ci --legacy-peer-deps

            - name: Build SDK
              run: npm run build --workspace backend-services/libs/core/sdk --if-present

            - name: Create DB schemas
              run: PGPASSWORD=cinema_pass psql -h localhost -U cinema_user -d cinema_db -c "CREATE SCHEMA IF NOT EXISTS identity;"

            - name: Check coverage thresholds
              run: npm run test:cov --workspaces --if-present
