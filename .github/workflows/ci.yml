name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    NODE_VERSION: '24'

jobs:
    # ── 1. Build ──────────────────────────────────────────────────────────────────
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint (zero warnings)
              run: npm run lint -- --max-warnings 0

            - name: Format check
              run: npm run format:check

            - name: Dependency audit (report)
              run: npm audit --audit-level=high || true

            - name: Dependency audit (gate — critical only, ADR-14)
              run: npm audit --audit-level=critical

            - name: Build SDK
              run: |
                  set -o pipefail
                  npm run build --workspace backend-services/libs/core/sdk --if-present 2>&1 | tee /tmp/sdk_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/sdk_out.txt

            - name: Build shared
              run: |
                  set -o pipefail
                  npm run build --workspace backend-services/libs/core/shared --if-present 2>&1 | tee /tmp/shared_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/shared_out.txt

            - name: Typecheck all workspaces
              run: |
                  set -o pipefail
                  npm run typecheck 2>&1 | tee /tmp/tc_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/tc_out.txt

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build identity-service image
              uses: docker/build-push-action@v7
              if: hashFiles('backend-services/identity-service/Dockerfile') != ''
              with:
                  context: .
                  file: backend-services/identity-service/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build cinema-service image
              uses: docker/build-push-action@v7
              if: hashFiles('backend-services/cinema-service/Dockerfile') != ''
              with:
                  context: .
                  file: backend-services/cinema-service/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build cinema-app image
              uses: docker/build-push-action@v7
              if: hashFiles('frontend-application/cinema-app/Dockerfile') != ''
              with:
                  context: .
                  file: frontend-application/cinema-app/Dockerfile
                  push: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ── 2. Unit Tests (frontend + backend) ───────────────────────────────────────
    unit-tests:
        name: Unit Tests
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build SDK
              run: npm run build --workspace backend-services/libs/core/sdk --if-present

            - name: Build shared
              run: npm run build --workspace backend-services/libs/core/shared --if-present

            - name: Run unit tests
              run: |
                  set -o pipefail
                  npm run test:unit --workspaces --if-present 2>&1 | tee /tmp/unit_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/unit_out.txt

            - name: Upload coverage reports
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: coverage-unit
                  path: |
                      backend-services/*/coverage
                      frontend-application/*/coverage
                  retention-days: 7

    # ── 3. Integration & API Tests (backend, Postgres) ────────────────────────────
    integration-tests:
        name: Integration & API Tests
        needs: unit-tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: cinema_user
                    POSTGRES_PASSWORD: cinema_pass
                    POSTGRES_DB: cinema_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U cinema_user"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            TEST_DB_HOST: localhost
            TEST_DB_PORT: 5432
            TEST_DB_USERNAME: cinema_user
            TEST_DB_PASSWORD: cinema_pass
            TEST_DB_NAME: cinema_db
            JWT_SECRET: test-cinema-jwt-secret-minimum-32-chars!!

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build SDK
              run: npm run build --workspace backend-services/libs/core/sdk --if-present

            - name: Build shared
              run: npm run build --workspace backend-services/libs/core/shared --if-present

            - name: Create DB schemas
              run: PGPASSWORD=cinema_pass psql -h localhost -U cinema_user -d cinema_db -c "CREATE SCHEMA IF NOT EXISTS identity; CREATE SCHEMA IF NOT EXISTS cinema;"

            - name: Run integration tests
              run: |
                  set -o pipefail
                  npm run test:integration --workspaces --if-present 2>&1 | tee /tmp/int_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/int_out.txt

            - name: Run API tests
              run: |
                  set -o pipefail
                  npm run test:api --workspaces --if-present 2>&1 | tee /tmp/api_out.txt || \
                    grep -qE "No workspaces found|Workspace not found" /tmp/api_out.txt

            - name: Check coverage thresholds
              run: npm run test:cov --workspaces --if-present

    # ── 4. E2E & Page Tests (frontend, Playwright) ────────────────────────────────
    e2e-tests:
        name: E2E & Page Tests
        needs: unit-tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
              working-directory: frontend-application/cinema-app
              continue-on-error: true

            - name: Run Playwright page tests
              run: npm run test:e2e --workspaces --if-present
              continue-on-error: true
