upstream identity_upstream { server identity-service:3001; }
upstream cinema_upstream   { server cinema-service:3002; }
upstream app_upstream      { server cinema-app:5173; }

server {
    listen 80;
    server_name _;

    # Auth API → identity-service (must come BEFORE the generic /api/v1/)
    location /api/v1/auth/ {
        proxy_pass http://identity_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else under /api/v1/ → cinema-service
    location /api/v1/ {
        proxy_pass http://cinema_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.io → cinema-service (WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://cinema_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400s;
    }

    # Vite dev server (HMR WebSocket upgrade)
    location /@vite/ {
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    # SPA (Vite dev server) — pass all other requests through
    location / {
        proxy_pass http://app_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
